name: CI

on:
  pull_request:
  push:
    branches: [master]

env:
  PNPM_VERSION: "11.6.0"
  NODE_VERSION: "22"

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase (profile project)
        working-directory: supabase/profile
        run: supabase start

      # apps/web, apps/api-profile, packages/shared-types,
      # infra (CDK assertion tests — no AWS credentials required).
      - name: Unit & integration tests
        run: pnpm --filter '!@portfolio/api-site' test

      - name: RLS integration tests (profile project)
        run: pnpm test:db:profile

      - name: Install Playwright browsers
        run: pnpm --filter @portfolio/web exec playwright install --with-deps chromium

      - name: End-to-end tests
        run: pnpm --filter @portfolio/web test:e2e

      - name: Stop local Supabase
        if: always()
        run: |
          (cd supabase/profile && supabase stop) || true

  cdk-synth:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: cdk synth
        working-directory: infra
        run: pnpm exec cdk synth --quiet
        env:
          DOMAIN_NAME: example.com
          HOSTED_ZONE_ID: Z00000000000000EXAMPLE
          PROFILE_SUPABASE_SECRET_ARN: "arn:aws:secretsmanager:eu-central-1:000000000000:secret:portfolio/profile/supabase-placeholder"
          PROFILE_ALLOWED_ORIGINS: "https://example.com"
