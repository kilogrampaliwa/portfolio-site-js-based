version: 1
applications:
  - appRoot: apps/web
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@10.11.0 --activate
            - pnpm install --frozen-lockfile
            - pnpm --filter @portfolio/shared-types build
        build:
          commands:
            - echo "PROFILE_API_KEY=$PROFILE_API_KEY" >> apps/web/.env.production
            - pnpm --filter @portfolio/web build
      artifacts:
        baseDirectory: apps/web/.next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - apps/web/.next/cache/**/*
