version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@10.11.0 --activate
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @portfolio/shared-types build
        build:
          commands:
            - cd ../.. && pnpm --filter @portfolio/web build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
