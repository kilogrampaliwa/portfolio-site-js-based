version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@11.6.0 --activate
            - cd ../.. && pnpm install --frozen-lockfile
            - export npm_config_verify_deps_before_run=false
            - cd ../.. && pnpm --config.verify-deps-before-run=false exec tsc -p packages/shared-types/tsconfig.json
        build:
          commands:
            - pnpm --config.verify-deps-before-run=false build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
