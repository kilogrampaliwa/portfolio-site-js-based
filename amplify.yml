version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@11.6.0 --activate
            - export TMPDIR=/tmp
            - export PNPM_HOME=/tmp/pnpm
            - export PNPM_STORE_DIR=/tmp/pnpm-store
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && pnpm --filter @portfolio/shared-types build
        build:
          commands:
            - pnpm build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - /tmp/pnpm-store/**/*
          - .next/cache/**/*
