version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - corepack prepare pnpm@10.11.0 --activate
        - pnpm install --frozen-lockfile
        - pnpm --filter @portfolio/shared-types build
    build:
      commands:
        - cd apps/web && node_modules/.bin/next build
  artifacts:
    baseDirectory: apps/web/.next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - apps/web/.next/cache/**/*
