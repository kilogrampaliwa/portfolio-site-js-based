version: 1
applications:
  - appRoot: apps/web
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@11.6.0 --activate
            - cd ../.. && pnpm install --frozen-lockfile
            - cd ../.. && node -e "require('child_process').execFileSync(process.execPath,[require.resolve('typescript/bin/tsc'),'-p','packages/shared-types/tsconfig.json'],{stdio:'inherit'})"
        build:
          commands:
            - ./node_modules/.bin/next build
      artifacts:
        baseDirectory: .next
        files:
          - "**/*"
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
